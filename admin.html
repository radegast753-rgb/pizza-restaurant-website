<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Admin Panel</title>
    <style>
        :root {
            --bg-main: #111;
            --bg-card: #222;
            --primary: #e69129;
            --primary-hover: #ffaa3d;
            --danger: #992222;
            --danger-hover: #bd2d2d;
            --text-main: #fff;
            --text-muted: #aaa;
            --border: #333;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 40px; margin: 0; }
        .box { max-width: 550px; margin: 0 auto; background: var(--bg-card); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        h2 { margin-top: 0; font-size: 24px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        .hidden { display: none !important; }

        label { display: block; margin: 12px 0 6px; font-size: 14px; color: var(--text-muted); font-weight: 600; }
        input, button, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border-radius: 6px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 15px; }
        input:focus, select:focus, textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
        
        button { background: var(--primary); border: none; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        
        .btn-danger { background: var(--danger); margin-top: 5px; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-secondary { background: #333; color: #eee; margin-top: 15px; }
        .btn-secondary:hover { background: #444; }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 50px; }
        #toggle-password { position: absolute; right: 5px; top: 0; width: 40px; height: 47px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
        
        .preview-category-title { color: var(--primary); font-weight: bold; margin-top: 25px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
        .preview-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 12px 0; animation: fadeIn 0.3s ease; }
        .preview-details small { color: var(--text-muted); display: block; margin-top: 4px; }
        
        .delete-btn { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; width: auto; margin: 0; padding: 0 10px; transition: color 0.2s; }
        .delete-btn:hover { color: #ff4444; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="login-block" class="box">
        <h2>Admin Panel Login</h2>
        <p style="color: var(--text-muted); font-size: 14px;">For HR: default password is <b>admin123</b></p>
        <div class="password-wrapper">
            <input type="password" id="pass-input" placeholder="Enter password">
            <button type="button" id="toggle-password" tabindex="-1">&#128065;</button>
        </div>
        <button id="login-btn" style="margin-top: 10px;">Login</button> 
        <p id="error-msg" style="color: #ff4444; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="admin-panel" class="box hidden">
        <h2>Menu Management</h2>
        
        <form id="dish-form" onsubmit="event.preventDefault(); addDish();">
            <label>Category *</label>
            <select id="dish-category">
                <option value="drinks">Drinks</option>
                <option value="main">Main Course</option>
                <option value="secondary">Secondary Course</option>
            </select>

            <label>Dish Title *</label>
            <input type="text" id="dish-title" placeholder="your name" required>
            
            <label>Price *</label>
            <input type="text" id="dish-price" placeholder="your price" required>
            
            <label>Description</label>
            <textarea id="dish-desc" placeholder="your data" rows="3"></textarea>
            
            <button type="submit">Add to Menu</button>
        </form>
        
        <button onclick="resetToDemo()" class="btn-secondary">Reset to Large Demo (6, 8, 5)</button>
        <button onclick="clearMenu()" class="btn-danger">Clear All Menu</button>
        
        <h3>Current Menu Preview</h3>
        <div id="preview-list"></div>
    </div>

    <script>
        const targetToken = "YWRtaW4xMjM=";

        const defaultLargeMenu = [
            { id: "demo-d1", category: "drinks", title: "Espresso", desc: "Rich and intense classic black coffee", price: "$3.00" },
            { id: "demo-d2", category: "drinks", title: "Cappuccino", desc: "Espresso blended with steamed milk foam", price: "$4.50" },
            { id: "demo-d3", category: "drinks", title: "Iced Latte", desc: "Chilled espresso with cold milk over ice", price: "$5.00" },
            { id: "demo-d4", category: "drinks", title: "Green Tea", desc: "Fragrant and refreshing organic leaf tea", price: "$3.50" },
            { id: "demo-d5", category: "drinks", title: "Fresh Orange Juice", desc: "100% freshly squeezed citrus juice", price: "$6.00" },
            { id: "demo-d6", category: "drinks", title: "Mineral Water", desc: "Pure spring water", price: "$2.50" },
            
            { id: "demo-m1", category: "main", title: "Pizza Margherita", desc: "Classic fresh tomato sauce and melted mozzarella", price: "$12.00" },
            { id: "demo-m2", category: "main", title: "Pepperoni Feast", desc: "Spicy pepperoni slices with extra cheese crust", price: "$15.50" },
            { id: "demo-m3", category: "main", title: "Beef Burger", desc: "Juicy grilled beef patty with cheddar and relish", price: "$14.00" },
            { id: "demo-m4", category: "main", title: "Ribeye Steak", desc: "Premium tender beef steak served with pepper sauce", price: "$28.00" },
            { id: "demo-m5", category: "main", title: "Spaghetti Carbonara", desc: "Traditional pasta with crispy bacon and egg yolk cream", price: "$13.50" },
            { id: "demo-m6", category: "main", title: "Grilled Salmon", desc: "Fresh salmon fillet with lemon herb butter sauce", price: "$22.00" },
            { id: "demo-m7", category: "main", title: "Chicken Alfredo", desc: "Fettuccine pasta in rich creamy parmesan sauce", price: "$16.00" },
            { id: "demo-m8", category: "main", title: "Vegetarian Risotto", desc: "Arborio rice cooked with wild mushrooms and truffle oil", price: "$14.50" },
            
            { id: "demo-s1", category: "secondary", title: "Caesar Salad", desc: "Crispy romaine, parmesan, croutons, and creamy dressing", price: "$9.50" },
            { id: "demo-s2", category: "secondary", title: "French Fries", desc: "Golden crispy potato fries with sea salt", price: "$4.50" },
            { id: "demo-s3", category: "secondary", title: "Garlic Bread", desc: "Toasted baguette slices with garlic butter and herbs", price: "$5.00" },
            { id: "demo-s4", category: "secondary", title: "Greek Salad", desc: "Fresh cucumbers, tomatoes, olives, and feta cheese block", price: "$10.50" },
            { id: "demo-s5", category: "secondary", title: "Onion Rings", desc: "Deep-fried battered onion rings with BBQ dip", price: "$6.00" }
        ];

        if (!localStorage.getItem('restaurant-menu')) {
            localStorage.setItem('restaurant-menu', JSON.stringify(defaultLargeMenu));
        }
        document.getElementById('toggle-password').addEventListener('click', function () {
            const passwordInput = document.getElementById('pass-input');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.innerHTML = '&#12514;';
            } else {
                passwordInput.type = 'password';
                this.innerHTML = '&#128065;';
            }
            passwordInput.focus(); 
        });

        document.getElementById('login-btn').addEventListener('click', () => {
            const password = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('error-msg');

            if (btoa(password) === targetToken) {
                document.getElementById('login-block').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                updatePreview();
            } else {
                errorMsg.innerText = "Incorrect password!";
            }
        });

        function addDish() {
            const menu = JSON.parse(localStorage.getItem('restaurant-menu')) || [];
            
            const newDish = {
                id: "dish-" + Date.now(),
                category: document.getElementById('dish-category').value,
                title: document.getElementById('dish-title').value.trim(),
                price: document.getElementById('dish-price').value.trim(),
                desc: document.getElementById('dish-desc').value.trim()
            };

            menu.push(newDish);
            localStorage.setItem('restaurant-menu', JSON.stringify(menu));
            
            document.getElementById('dish-form').reset();
            updatePreview();
        }

        function updatePreview() {
            const menu = JSON.parse(localStorage.getItem('restaurant-menu')) || [];
            const container = document.getElementById('preview-list');

            if (menu.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; margin-top: 20px;">The menu is completely empty.</p>';
                return;
            }

            const categories = { drinks: 'Drinks', main: 'Main Course', secondary: 'Secondary Course' };
            let html = '';

            for (let catKey in categories) {
                const catDishes = menu.filter(d => d.category === catKey);
                if (catDishes.length > 0) {
                    html += `<div class="preview-category-title">${categories[catKey]}</div>`;
                    catDishes.forEach(dish => {
                        html += `
                            <div class="preview-item">
                                <div class="preview-details">
                                    <b>${dish.title}</b> — ${dish.price}
                                    <small>${dish.desc || 'No description'}</small>
                                </div>
                                <button class="delete-btn" onclick="deleteDish('${dish.id}')">&times;</button>
                            </div>
                        `;
                    });
                }
            }
            container.innerHTML = html;
        }

        function deleteDish(id) {
            let menu = JSON.parse(localStorage.getItem('restaurant-menu')) || [];
            menu = menu.filter(dish => dish.id !== id);
            localStorage.setItem('restaurant-menu', JSON.stringify(menu));
            updatePreview();
        }

        function resetToDemo() {
            if(confirm('Reload the large demo template (6, 8, 5)? Current custom edits will be overwritten.')) {
                localStorage.setItem('restaurant-menu', JSON.stringify(defaultLargeMenu));
                updatePreview();
            }
        }

        function clearMenu() {
            if(confirm('Are you sure you want to delete the ENTIRE menu?')) {
                localStorage.setItem('restaurant-menu', JSON.stringify([]));
                updatePreview();
            }
        }
    </script>
</body>
</html>
